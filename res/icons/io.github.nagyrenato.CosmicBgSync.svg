<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="50%" stop-color="#3d2a6e"/>
      <stop offset="100%" stop-color="#ff7043"/>
    </linearGradient>
    <clipPath id="frameClip">
      <rect x="8" y="8" width="112" height="112" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="112" height="112" rx="20" fill="url(#skyGrad)"/>

  <!-- Mountain silhouette -->
  <polygon points="8,90 35,45 55,70 75,35 100,70 120,55 120,112 8,112"
           fill="#1a1a2e" opacity="0.85" clip-path="url(#frameClip)"/>

  <!-- Horizon glow -->
  <line x1="8" y1="82" x2="120" y2="82" stroke="#ff7043" stroke-width="2" opacity="0.5"/>

  <!-- Moon (left side — dark mode) -->
  <circle cx="30" cy="30" r="13" fill="#e8e0f0"/>
  <circle cx="37" cy="23" r="10" fill="#3d2a6e"/>

  <!-- Sun (right side — light mode) -->
  <circle cx="98" cy="30" r="13" fill="#ffd740"/>
  <g stroke="#ffd740" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
    <line x1="98" y1="11" x2="98" y2="7"/>
    <line x1="98" y1="49" x2="98" y2="53"/>
    <line x1="79" y1="30" x2="75" y2="30"/>
    <line x1="117" y1="30" x2="121" y2="30"/>
    <line x1="85" y1="17" x2="82" y2="14"/>
    <line x1="111" y1="43" x2="114" y2="46"/>
    <line x1="111" y1="17" x2="114" y2="14"/>
    <line x1="85" y1="43" x2="82" y2="46"/>
  </g>

  <!-- Swap/switch arrows -->
  <g fill="white" opacity="0.9">
    <polygon points="56,63 63,58 63,68"/>
    <polygon points="72,63 65,58 65,68"/>
    <rect x="58" y="61" width="12" height="4" rx="2"/>
  </g>

  <!-- Outer border highlight -->
  <rect x="8" y="8" width="112" height="112" rx="20"
        fill="none" stroke="white" stroke-width="2" opacity="0.15"/>
</svg>
