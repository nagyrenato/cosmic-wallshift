app-id: io.github.YOUR_USERNAME.CosmicBgSync
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: cosmic-bg-sync

finish-args:
  # Wayland display
  - --socket=wayland
  # GPU rendering
  - --device=dri
  # Read theme mode file, write wallpaper config — both live under ~/.config/cosmic/
  - --filesystem=xdg-config/cosmic:rw
  # System tray (StatusNotifierItem)
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/cosmic-bg-sync/cargo
    RUST_BACKTRACE: '1'

modules:
  - name: cosmic-bg-sync
    buildsystem: simple
    build-commands:
      # Offline build using vendored sources (see README — Flatpak section)
      - cargo --offline build --release --verbose
      - install -Dm755 target/release/cosmic-bg-sync /app/bin/cosmic-bg-sync
      # Desktop entry
      - install -Dm644 res/io.github.YOUR_USERNAME.CosmicBgSync.desktop
          /app/share/applications/io.github.YOUR_USERNAME.CosmicBgSync.desktop
      # AppStream metainfo
      - install -Dm644 res/io.github.YOUR_USERNAME.CosmicBgSync.metainfo.xml
          /app/share/metainfo/io.github.YOUR_USERNAME.CosmicBgSync.metainfo.xml
      # Icon (scalable SVG)
      - install -Dm644 res/icons/io.github.YOUR_USERNAME.CosmicBgSync.svg
          /app/share/icons/hicolor/scalable/apps/io.github.YOUR_USERNAME.CosmicBgSync.svg
    sources:
      - type: dir
        path: .
      # Generated by: flatpak-cargo-generator.py Cargo.lock -o cargo-sources.json
      # Run that command once and commit cargo-sources.json alongside this manifest.
      - cargo-sources.json
